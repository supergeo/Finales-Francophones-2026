<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Finales Francophones Jeunes 2026 - Spa Volley</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="logo">SPA VOLLEY</div>
    <h1>Finales Francophones Jeunes 2026</h1>
    <p>16 & 17 mai – La Fraineuse, Spa</p>
  </header>

  <nav class="nav">
    <button data-section="accueil">Accueil</button>
    <button data-section="samedi">Samedi</button>
    <button data-section="dimanche">Dimanche</button>
    <button data-section="equipes">Équipes</button>
    <button data-section="categories">Catégories</button>
    <button data-section="terrains">Terrains</button>
    <button data-section="infos">Infos</button>
    <button data-section="matchs" class="gold-btn">Matchs</button>
  </nav>

  <main>
    <!-- ACCUEIL -->
    <section id="accueil" class="section active">
      <h2>Bienvenue</h2>
      <p>Finales Francophones Jeunes 2026 – Spa Volley Club.</p>
      <div class="grid-buttons">
        <button data-section="samedi" class="card-btn">Horaires samedi</button>
        <button data-section="dimanche" class="card-btn">Horaires dimanche</button>
        <button data-section="equipes" class="card-btn">Équipes</button>
        <button data-section="categories" class="card-btn">Catégories</button>
        <button data-section="terrains" class="card-btn">Terrains</button>
        <button data-section="infos" class="card-btn">Infos</button>
        <button data-section="matchs" class="card-btn gold-btn">Matchs</button>
      </div>
    </section>

    <!-- MATCHS -->
    <section id="matchs" class="section">
      <h2>Matchs</h2>
      <div id="matchs-en-cours" class="match-list"></div>
      <div id="matchs-suivants" class="match-list"></div>
      <button id="encoder-score" class="gold-btn hidden">Encoder un score</button>
    </section>

    <!-- Autres sections (samedi, dimanche, etc.) -->
    <section id="samedi" class="section"><h2>Horaires samedi</h2><div id="samedi-list"></div></section>
    <section id="dimanche" class="section"><h2>Horaires dimanche</h2><div id="dimanche-list"></div></section>
    <section id="equipes" class="section"><h2>Équipes</h2><div id="equipes-buttons"></div><div id="equipes-result"></div></section>
    <section id="categories" class="section"><h2>Catégories</h2><div id="categories-list"></div></section>
    <section id="terrains" class="section"><h2>Terrains</h2><div id="terrains-list"></div></section>
    <section id="infos" class="section"><h2>Infos</h2><div id="infos-list"></div></section>
  </main>

  <!-- MODAL ADMIN -->
  <div id="admin-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Accès administrateur</h3>
      <p>Entrer le code :</p>
      <input type="password" id="admin-code" maxlength="4" />
      <div class="modal-actions">
        <button id="admin-cancel">Annuler</button>
        <button id="admin-validate">Valider</button>
      </div>
      <p id="admin-error" class="error-msg"></p>
    </div>
  </div>

  <!-- FORMULAIRE SCORE -->
  <div id="score-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Encoder un score</h3>
      <p id="score-match"></p>
      <input type="number" id="scoreA" placeholder="Score équipe A" />
      <input type="number" id="scoreB" placeholder="Score équipe B" />
      <button id="score-save">Enregistrer</button>
      <button id="score-close">Fermer</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
